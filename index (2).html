<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محطة قفصة - S.R.T.G Gafsa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #050c1a;
            color: white;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ══ HEADER ══ */
        .header {
            background: #0b1628;
            border-bottom: 4px solid #10b981;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .brand-ar {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .brand-fr {
            font-size: 16px;
            color: #10b981;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .clock {
            font-size: 52px;
            font-weight: 900;
            color: #facc15;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }
        .date-disp {
            font-size: 18px;
            color: #94a3b8;
        }

        /* ══ TABLE AREA ══ */
        .table-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        thead th {
            background: #070e1c;
            padding: 16px 20px;
            border-bottom: 3px solid #10b981;
            text-align: center;
            font-size: 20px;
            color: #facc15;
        }

        .th-fr {
            display: block;
            font-size: 13px;
            color: #475569;
            font-weight: 400;
            margin-top: 2px;
        }

        tbody tr {
            border-bottom: 1px solid #111e35;
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(16,185,129,0.04); }
        tbody tr.cancelled { background: rgba(239,68,68,0.07); }

        td {
            padding: 18px 20px;
            text-align: center;
            vertical-align: middle;
        }

        .dest-ar { font-size: 30px; font-weight: 700; color: #fff; }
        .dest-fr { font-size: 16px; color: #64748b; margin-top: 3px; }
        .via-lbl { font-size: 14px; color: #facc15; font-weight: 700; margin-top: 4px; }

        .origin-ar { font-size: 22px; font-weight: 700; color: #94a3b8; }
        .origin-fr { font-size: 14px; color: #475569; margin-top: 3px; }

        .time-cell {
            font-size: 40px;
            font-weight: 900;
            color: #facc15;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        tr.cancelled .time-cell { color: #ef4444; }

        .status-ok { font-size: 22px; font-weight: 700; color: #10b981; display: block; }
        .status-no { font-size: 22px; font-weight: 700; color: #ef4444; display: block; }

        /* ══ ADMIN BUTTONS ══ */
        .action-btn {
            display: none;
            margin-top: 8px;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            border: 2px solid;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        body.admin-mode .action-btn { display: inline-block; }

        .btn-cancel { color: #ef4444; border-color: #ef4444; }
        .btn-cancel:hover { background: #ef4444; color: white; }
        .btn-restore { color: #10b981; border-color: #10b981; }
        .btn-restore:hover { background: #10b981; color: white; }

        /* ══ ADMIN TOGGLE ══ */
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            background: #0b1628;
            color: #64748b;
            border: 2px solid #1e2d45;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .admin-toggle:hover { border-color: #facc15; color: #facc15; }
        .admin-toggle.active { border-color: #10b981; color: #10b981; background: #071a10; }

        /* ══ FOOTER TICKER ══ */
        .footer {
            background: #040a14;
            border-top: 3px solid #facc15;
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ticker {
            display: inline-block;
            font-size: 22px;
            color: #facc15;
            font-weight: 700;
            letter-spacing: 1px;
            padding-right: 100%;
            animation: marquee 32s linear infinite;
        }
        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

<button class="admin-toggle" id="adminBtn" onclick="toggleAdmin()">
    ⚙ <span id="adminLabel">إدارة</span>
</button>

<div class="app">
    <div class="header">
        <div>
            <div class="brand-ar">الشركة الجهوية للنقل القوافل قفصة</div>
            <div class="brand-fr">S.R.T.G EL GAWAFEL GAFSA</div>
        </div>
        <div class="header-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-disp" id="datedisp">-- / -- / ----</div>
        </div>
    </div>

    <div class="table-wrap" id="tableWrap">
        <table>
            <thead>
                <tr>
                    <th>الانطلاق<span class="th-fr">Départ</span></th>
                    <th>الوجهة<span class="th-fr">Destination</span></th>
                    <th>التوقيت<span class="th-fr">Horaire</span></th>
                    <th>الحالة<span class="th-fr">État</span></th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="footer">
        <span class="ticker">
            الشركة الجهوية للنقل القوافل قفصة دائما في خدمتكم &nbsp;&nbsp;|&nbsp;&nbsp; S.R.T.G El Gawafel Gafsa est toujours à votre service
        </span>
    </div>
</div>

<script>
const trips = [
    { dest: 'المنستير', fr: 'Monastir', time: '04:30' },
    { dest: 'جربة', fr: 'Djerba', time: '04:30' },
    { dest: 'نابل', fr: 'Nabeul', time: '05:00' },
    { dest: 'القطار', fr: 'El Ktar', time: '05:15' },
    { dest: 'سيدي بوبكر', fr: 'Sidi Boubaker', time: '05:15' },
    { dest: 'حوال الواد', fr: 'Houal El Wed', time: '05:15' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '05:30' },
    { dest: 'سوسة', fr: 'Sousse', time: '06:00' },
    { dest: 'سيدي عيش', fr: 'Sidi Aïch', time: '06:00' },
    { dest: 'عليم', fr: 'Alim', time: '06:00' },
    { dest: 'الرديف', fr: 'Redeyef', time: '06:15' },
    { dest: 'القطار', fr: 'El Ktar', time: '06:30' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '06:30' },
    { dest: 'قابس', fr: 'Gabès', time: '07:00' },
    { dest: 'صفاقس', fr: 'Sfax', time: '07:00' },
    { dest: 'السند', fr: 'El Sened', time: '07:00' },
    { dest: 'توزر', fr: 'Tozeur', time: '07:30' },
    { dest: 'القطار', fr: 'El Ktar', time: '09:00' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '09:00' },
    { dest: 'توزر', fr: 'Tozeur', time: '10:00' },
    { dest: 'القطار', fr: 'El Ktar', time: '10:45' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '10:45' },
    { dest: 'الرديف', fr: 'Redeyef', time: '10:45' },
    { dest: 'صفاقس', fr: 'Sfax', time: '10:45', via: 'عبر سيدي بوزيد / Via S.Bouzid' },
    { dest: 'سيدي عيش', fr: 'Sidi Aïch', time: '12:00' },
    { dest: 'سيدي بوبكر', fr: 'Sidi Boubaker', time: '12:00' },
    { dest: 'القطار', fr: 'El Ktar', time: '12:30' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '12:30' },
    { dest: 'السند', fr: 'El Sened', time: '12:30' },
    { dest: 'توزر', fr: 'Tozeur', time: '12:30' },
    { dest: 'عليم', fr: 'Alim', time: '14:00' },
    { dest: 'القطار', fr: 'El Ktar', time: '14:00' },
    { dest: 'سيدي عيش', fr: 'Sidi Aïch', time: '15:00' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '15:00' },
    { dest: 'سيدي بوزيد', fr: 'Sidi Bouzid', time: '16:45' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '17:00' },
    { dest: 'القطار', fr: 'El Ktar', time: '17:15' },
    { dest: 'توزر', fr: 'Tozeur', time: '17:30' },
    { dest: 'القطار', fr: 'El Ktar', time: '18:30' },
    { dest: 'المظيلة', fr: 'Mdhilla', time: '18:30' },
];

const state = trips.map(() => ({ cancelled: false }));
let adminMode = false;
let scrollDir = 1;
let scrolling = true;

function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = trips.map((t, i) => {
        const c = state[i].cancelled;
        return `<tr class="${c ? 'cancelled' : ''}">
            <td>
                <div class="origin-ar">قفصة</div>
                <div class="origin-fr">Gafsa</div>
            </td>
            <td>
                <div class="dest-ar">${t.dest}</div>
                <div class="dest-fr">${t.fr}</div>
                ${t.via ? `<div class="via-lbl">${t.via}</div>` : ''}
            </td>
            <td class="time-cell">${t.time}</td>
            <td>
                <span class="${c ? 'status-no' : 'status-ok'}">${c ? 'ملغاة' : 'مبرمجة'}</span>
                <button class="action-btn ${c ? 'btn-restore' : 'btn-cancel'}" onclick="toggle(${i})">${c ? '✔ رجوع' : '✕ إلغاء'}</button>
            </td>
        </tr>`;
    }).join('');
}

function toggle(i) {
    state[i].cancelled = !state[i].cancelled;
    render();
}

function toggleAdmin() {
    adminMode = !adminMode;
    document.body.classList.toggle('admin-mode', adminMode);
    const btn = document.getElementById('adminBtn');
    const lbl = document.getElementById('adminLabel');
    btn.classList.toggle('active', adminMode);
    lbl.textContent = adminMode ? 'إيقاف الإدارة' : 'إدارة';
    scrolling = !adminMode;
}

/* Clock */
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
    const d = String(now.getDate()).padStart(2,'0');
    const m = String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('datedisp').textContent = d + ' / ' + m + ' / ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

/* Auto-scroll */
const wrap = document.getElementById('tableWrap');
setInterval(() => {
    if (!scrolling) return;
    wrap.scrollTop += scrollDir;
    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight) scrollDir = -1;
    if (wrap.scrollTop <= 0) scrollDir = 1;
}, 40);

render();
</script>
</body>
</html>
